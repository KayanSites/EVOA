<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EVOA · Train Smarter. Evolve Stronger.</title>
<meta name="theme-color" content="#0A0A0F">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EVOA">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#08080C; --surface:#14141C; --surface-2:#1C1C27;
  --line:#2A2A38; --text:#F2F2F7; --muted:#8B8B9E;
  --accent:#8B5CF6; --accent-2:#A78BFA; --accent-soft:rgba(139,92,246,.14);
  --up:#34D399; --down:#F87171; --flat:#FBBF24;
  --r:14px;
  --display:'Space Grotesk',system-ui;
  --body:'IBM Plex Sans Arabic','Inter',system-ui;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--body);
     -webkit-font-smoothing:antialiased;line-height:1.55;min-height:100vh}
[dir=ltr] body{font-family:'Inter',system-ui}

/* ══ SPLASH ══════════════════════════════════════════ */
#splash{position:fixed;inset:0;z-index:100;background:var(--bg);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
        transition:opacity .5s ease, visibility .5s}
#splash.gone{opacity:0;visibility:hidden}
/* the glow ring is the one flourish — everything else stays quiet */
.mark{position:relative;width:180px;height:180px;display:grid;place-items:center}
.mark::before{content:'';position:absolute;inset:-14%;border-radius:50%;
  background:radial-gradient(circle,var(--accent-soft) 0%,transparent 68%);
  animation:pulse 2.6s ease-in-out infinite}
.mark img{width:100%;height:100%;object-fit:contain;position:relative;
  animation:rise .8s cubic-bezier(.2,.8,.2,1) both}
.tag{font-family:var(--display);font-size:12px;letter-spacing:.28em;color:var(--accent-2);
     text-transform:uppercase;animation:rise .8s .25s cubic-bezier(.2,.8,.2,1) both}
.tag small{display:block;color:var(--muted);letter-spacing:.2em;font-size:10px;margin-top:8px}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.94)}50%{opacity:1;transform:scale(1.04)}}

/* ══ SHELL ═══════════════════════════════════════════ */
header{display:flex;align-items:center;justify-content:space-between;gap:12px;
       padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;
       background:rgba(8,8,12,.85);backdrop-filter:blur(12px);z-index:10}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--display);
       font-weight:700;font-size:18px;letter-spacing:.14em}
.brand img{width:26px;height:26px;object-fit:contain}
main{max-width:760px;margin:0 auto;padding:26px 20px 90px}
h2{font-family:var(--display);font-size:14px;font-weight:500;color:var(--muted);
   text-transform:uppercase;letter-spacing:.08em;margin:32px 0 14px}
h2:first-child{margin-top:0}

button{font:inherit;cursor:pointer;border:0;border-radius:10px;transition:.15s}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn{background:linear-gradient(135deg,var(--accent),#7C3AED);color:#fff;
     padding:13px 22px;font-weight:600;width:100%}
.btn:hover{filter:brightness(1.13)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:var(--surface-2);color:var(--text);padding:12px 18px;border:1px solid var(--line)}
.lang{background:none;color:var(--muted);border:1px solid var(--line);padding:6px 12px;font-size:13px}

/* ══ AUTH ════════════════════════════════════════════ */
#auth{max-width:380px;margin:8vh auto 0;padding:0 20px}
.auth-mark{width:96px;margin:0 auto 22px;display:block}
.tabs{display:flex;background:var(--surface);border:1px solid var(--line);
      border-radius:12px;padding:4px;margin-bottom:22px}
.tabs button{flex:1;background:none;color:var(--muted);padding:9px;font-weight:600;font-size:14px}
.tabs button.on{background:var(--accent-soft);color:var(--accent-2)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;
             letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;background:var(--surface);border:1px solid var(--line);
             border-radius:10px;padding:13px 14px;color:var(--text);font:inherit;font-size:16px}
.field input:focus{outline:none;border-color:var(--accent)}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
#authMsg{margin-top:14px;font-size:14px;text-align:center;min-height:20px}

/* ══ FORM GRID ═══════════════════════════════════════ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
.stat label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;
            letter-spacing:.06em;margin-bottom:5px}
.stat input,.stat select{width:100%;background:none;border:0;color:var(--text);
  font-family:var(--display);font-size:21px;font-weight:700;padding:0;-moz-appearance:textfield}
.stat input::-webkit-outer-spin-button,.stat input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stat select{font-size:15px;cursor:pointer}
.stat select option{background:var(--surface-2)}
.stat input:focus,.stat select:focus{outline:none;color:var(--accent-2)}
.stat.wide{grid-column:1/-1}
.stat.wide input,.stat.wide select{font-family:var(--body);font-size:16px;font-weight:500}
.delta{display:inline-block;margin-top:5px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:99px}
.delta.up{color:var(--up);background:rgba(52,211,153,.12)}
.delta.down{color:var(--down);background:rgba(248,113,113,.12)}
.delta.flat{color:var(--flat);background:rgba(251,191,36,.12)}

/* ══ LIST ════════════════════════════════════════════ */
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;
     background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
     padding:14px 16px;margin-bottom:8px}
.row .d{font-family:var(--display);font-weight:700}
.row .m{font-size:13px;color:var(--muted);margin-top:2px}
.dev{font-size:11px;color:var(--muted);opacity:.7}
.score{font-family:var(--display);font-size:20px;font-weight:700;color:var(--accent-2)}
.icon{background:none;color:var(--muted);padding:4px 7px;font-size:16px;line-height:1}
.icon:hover{color:var(--text)}
.icon.rm:hover{color:var(--down)}
.note{background:var(--surface);border:1px solid var(--line);border-inline-start:3px solid var(--flat);
      border-radius:10px;padding:12px 14px;font-size:14px;color:var(--muted);margin-bottom:14px}
.actions{display:flex;gap:10px;margin-top:16px}
.actions .btn{width:auto}
.hidden{display:none}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <div class="mark"><img src="mark.png" alt="EVOA"></div>
  <div class="tag">Train Smarter. Evolve Stronger.
    <small>AI Powered Personal Trainer</small>
  </div>
</div>

<!-- ══ AUTH ══ -->
<section id="auth" class="hidden">
  <img src="mark.png" class="auth-mark" alt="EVOA">
  <div class="tabs">
    <button id="tabIn"  class="on" data-t="tabin">دخول</button>
    <button id="tabUp"           data-t="tabup">حساب جديد</button>
  </div>

  <div class="field">
    <label data-t="email">البريد الإلكتروني</label>
    <input id="email" type="email" autocomplete="email">
  </div>
  <div class="field">
    <label data-t="password">كلمة السر</label>
    <input id="pass" type="password" autocomplete="current-password">
    <div class="hint hidden" id="passHint" data-t="passhint">٦ حروف على الأقل</div>
  </div>

  <button class="btn" id="goBtn" data-t="signin">دخول</button>
  <p id="authMsg"></p>
</section>

<!-- ══ APP ══ -->
<div id="shell" class="hidden">
  <header>
    <div class="brand"><img src="mark.png" alt="">EVOA</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="lang" id="langBtn">EN</button>
      <button class="btn-ghost" id="outBtn" data-t="signout" style="padding:6px 12px;font-size:13px">خروج</button>
    </div>
  </header>

  <main>
    <h2 id="formTitle" data-t="newreport">تقرير جديد</h2>
    <div class="grid" id="fields"></div>
    <div class="actions">
      <button class="btn" id="saveBtn" data-t="save">احفظي التقرير</button>
      <button class="btn-ghost hidden" id="cancelBtn" data-t="cancel">إلغاء</button>
    </div>
    <p id="msg" style="margin-top:12px;color:var(--down);font-size:14px"></p>

    <h2 data-t="history">التقارير السابقة</h2>
    <div id="list"></div>
  </main>
</div>

<script type="module">
/* ═══════════ CONFIG ═══════════ */
const CONFIG = {
  SUPABASE_URL:  'https://bmjosxgjilalobivxfcc.supabase.co',
  SUPABASE_ANON: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtam9zeGdqaWxhbG9iaXZ4ZmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzU3MDIsImV4cCI6MjA5OTU1MTcwMn0.jpqldX3FF1sMKRJfTL8eF3VnqJU8V7YBl_xtm2XEMyw',
  SPLASH_MS: 2000,
};
const db = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON);

/* ═══════════ i18n ═══════════ */
const T = {
  ar:{tabin:'دخول',tabup:'حساب جديد',email:'البريد الإلكتروني',password:'كلمة السر',
      passhint:'٦ حروف على الأقل',signin:'دخول',signup:'اعملي حساب',signout:'خروج',
      newreport:'تقرير جديد',editreport:'تعديل التقرير',save:'احفظي التقرير',cancel:'إلغاء',
      history:'التقارير السابقة',
      checkmail:'بصّي في إيميلك وأكّدي الحساب، وبعدين ادخلي.',
      empty:'لسه مفيش تقارير. سجّلي أول واحد فوق.',
      needweight:'التاريخ والوزن لازم يتملوا.',
      confirm:'تمسحي التقرير ده؟',
      devchanged:'الجهاز اتغيّر عن التقرير اللي قبله — المقارنة مش دقيقة.'},
  en:{tabin:'Sign in',tabup:'Sign up',email:'Email',password:'Password',
      passhint:'At least 6 characters',signin:'Sign in',signup:'Create account',signout:'Sign out',
      newreport:'New report',editreport:'Edit report',save:'Save report',cancel:'Cancel',
      history:'Past reports',
      checkmail:'Check your email to confirm your account, then sign in.',
      empty:'No reports yet. Add your first one above.',
      needweight:'Date and weight are required.',
      confirm:'Delete this report?',
      devchanged:'Different device from the previous report — comparison is not reliable.'},
};
let lang = localStorage.getItem('lang') || 'ar';
let mode = 'in';   // 'in' | 'up'

/* ═══════════ fields ═══════════ */
const DEVICES = ['InBody270','InBody370','InBody570','InBody770','InBody970','other'];
const FIELDS = [
  {k:'taken_at',     ar:'تاريخ التقرير', en:'Test date', type:'date',   wide:true, req:true},
  {k:'device_model', ar:'الجهاز',        en:'Device',    type:'select', opts:DEVICES, wide:true},
  {k:'weight',               ar:'الوزن (كجم)',     en:'Weight (kg)',   good:'down', req:true},
  {k:'skeletal_muscle_mass', ar:'العضل SMM (كجم)', en:'Muscle (kg)',   good:'up'},
  {k:'body_fat_pct',         ar:'نسبة الدهون %',   en:'Body fat %',    good:'down'},
  {k:'body_fat_mass',        ar:'كتلة الدهون',     en:'Fat mass (kg)', good:'down'},
  {k:'inbody_score',         ar:'InBody Score',    en:'InBody score',  good:'up'},
  {k:'visceral_fat_value',   ar:'الدهون الحشوية',  en:'Visceral fat',  good:'down'},
  {k:'visceral_fat_unit',    ar:'وحدة الحشوية',    en:'Visceral unit', type:'select', opts:['cm2','level']},
  {k:'bmr',              ar:'BMR (kcal)',      en:'BMR (kcal)',    good:'up'},
  {k:'bmi',              ar:'BMI',             en:'BMI'},
  {k:'fat_free_mass',    ar:'الكتلة بلا دهون', en:'Fat-free mass', good:'up'},
  {k:'total_body_water', ar:'الماء (لتر)',     en:'Water (L)'},
  {k:'protein',          ar:'البروتين (كجم)',  en:'Protein (kg)'},
  {k:'minerals',         ar:'المعادن (كجم)',   en:'Minerals (kg)'},
  {k:'waist_hip_ratio',  ar:'خصر/حوض',         en:'Waist–hip'},
  {k:'height',           ar:'الطول (سم)',      en:'Height (cm)'},
  {k:'age',              ar:'السن',            en:'Age'},
];

const state = { user:null, reports:[], editing:null };

/* ═══════════ splash ═══════════ */
setTimeout(() => splash.classList.add('gone'), CONFIG.SPLASH_MS);

/* ═══════════ language ═══════════ */
function applyLang(){
  const h = document.documentElement;
  h.lang = lang; h.dir = lang === 'ar' ? 'rtl' : 'ltr';
  langBtn.textContent = lang === 'ar' ? 'EN' : 'ع';
  document.querySelectorAll('[data-t]').forEach(el => el.textContent = T[lang][el.dataset.t]);
  goBtn.textContent = T[lang][mode === 'in' ? 'signin' : 'signup'];
  localStorage.setItem('lang', lang);
  if (state.user){ renderForm(state.editing); renderList(); }
}
langBtn.onclick = () => { lang = lang === 'ar' ? 'en' : 'ar'; applyLang(); };

/* ═══════════ auth ═══════════ */
function setMode(m){
  mode = m;
  tabIn.classList.toggle('on', m === 'in');
  tabUp.classList.toggle('on', m === 'up');
  passHint.classList.toggle('hidden', m === 'in');
  pass.autocomplete = m === 'in' ? 'current-password' : 'new-password';
  goBtn.textContent = T[lang][m === 'in' ? 'signin' : 'signup'];
  authMsg.textContent = '';
}
tabIn.onclick = () => setMode('in');
tabUp.onclick = () => setMode('up');

goBtn.onclick = async () => {
  const e = email.value.trim(), p = pass.value;
  if (!e || !p) return;
  goBtn.disabled = true;
  authMsg.style.color = 'var(--down)';

  if (mode === 'up'){
    const { data, error } = await db.auth.signUp({
      email:e, password:p, options:{ emailRedirectTo: location.href },
    });
    if (error) authMsg.textContent = error.message;
    else if (!data.session){                 // email confirmation is on
      authMsg.style.color = 'var(--up)';
      authMsg.textContent = T[lang].checkmail;
    }
  } else {
    const { error } = await db.auth.signInWithPassword({ email:e, password:p });
    if (error) authMsg.textContent = error.message;
  }
  goBtn.disabled = false;
};

outBtn.onclick = async () => { await db.auth.signOut(); location.reload(); };

db.auth.onAuthStateChange(async (_e, session) => {
  state.user = session?.user ?? null;
  auth.classList.toggle('hidden',  !!state.user);
  shell.classList.toggle('hidden', !state.user);
  if (state.user){ await loadReports(); renderForm(null); }
});

/* ═══════════ form ═══════════ */
function chip(good, val, prevVal){
  if (!good || val == null || prevVal == null) return '';
  const d = +(val - prevVal).toFixed(1);
  if (d === 0) return `<span class="delta flat">—</span>`;
  const better = good === 'up' ? d > 0 : d < 0;
  return `<span class="delta ${better?'up':'down'}">${d>0?'+':''}${d}</span>`;
}

function renderForm(report){
  state.editing = report;
  formTitle.textContent = report ? T[lang].editreport : T[lang].newreport;
  cancelBtn.classList.toggle('hidden', !report);

  const prev = state.reports.find(r => r.id !== report?.id);

  fields.innerHTML = FIELDS.map(f => {
    const v = report?.[f.k] ?? '';
    const input = f.type === 'select'
      ? `<select data-k="${f.k}"><option value=""></option>${
          f.opts.map(o => `<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')
        }</select>`
      : `<input data-k="${f.k}" type="${f.type || 'number'}" step="any"
                inputmode="${f.type==='date'?'':'decimal'}" value="${v}">`;
    return `<div class="stat ${f.wide?'wide':''}">
      <label>${f[lang]}${f.req?' *':''}</label>${input}
    </div>`;
  }).join('');

  // live comparison against the previous report, while typing
  if (prev){
    fields.querySelectorAll('input[type=number]').forEach(i => {
      const f = FIELDS.find(x => x.k === i.dataset.k);
      const draw = () => {
        i.parentElement.querySelector('.delta')?.remove();
        const html = chip(f.good, i.value === '' ? null : +i.value, prev[f.k]);
        if (html) i.insertAdjacentHTML('afterend', html);
      };
      i.oninput = draw;
      draw();
    });
  }
}
cancelBtn.onclick = () => renderForm(null);

/* ═══════════ save ═══════════ */
saveBtn.onclick = async () => {
  msg.textContent = '';
  const row = { user_id: state.user.id };
  fields.querySelectorAll('input,select').forEach(el => {
    const f = FIELDS.find(x => x.k === el.dataset.k);
    const raw = el.value.trim();
    row[el.dataset.k] = raw === '' ? null
      : (f.type === 'date' || f.type === 'select') ? raw : +raw;
  });
  if (state.editing) row.id = state.editing.id;

  if (!row.taken_at || row.weight == null){ msg.textContent = T[lang].needweight; return; }
  if (row.visceral_fat_value != null && !row.visceral_fat_unit) row.visceral_fat_unit = 'cm2';

  saveBtn.disabled = true;
  const { error } = await db.from('inbody_reports')
    .upsert(row, { onConflict:'user_id,taken_at' });
  saveBtn.disabled = false;
  if (error){ msg.textContent = error.message; return; }

  await loadReports();
  renderForm(null);
  window.scrollTo({ top:0, behavior:'smooth' });
};

/* ═══════════ history ═══════════ */
async function loadReports(){
  const { data, error } = await db.from('inbody_reports').select('*')
    .order('taken_at', { ascending:false });
  if (error){ msg.textContent = error.message; return; }
  state.reports = data || [];
  renderList();
}

function renderList(){
  if (!state.reports.length){ list.innerHTML = `<div class="note">${T[lang].empty}</div>`; return; }
  list.innerHTML = state.reports.map((r,i) => {
    const p = state.reports[i+1];
    const sameDevice = p && (!r.device_model || !p.device_model || r.device_model === p.device_model);
    const c = (k, good) => sameDevice ? chip(good, r[k], p[k]) : '';
    const warn = p && r.device_model && p.device_model && r.device_model !== p.device_model
      ? `<div class="dev" style="color:var(--flat)">⚠︎ ${T[lang].devchanged}</div>` : '';
    return `<div class="row">
      <div>
        <div class="d">${r.taken_at}</div>
        <div class="m">
          ${r.weight ?? '–'} kg ${c('weight','down')}
          · ${r.body_fat_pct ?? '–'}% ${c('body_fat_pct','down')}
          · SMM ${r.skeletal_muscle_mass ?? '–'} ${c('skeletal_muscle_mass','up')}
        </div>
        ${r.device_model ? `<div class="dev">${r.device_model}</div>` : ''}${warn}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="score">${r.inbody_score ?? '–'}</div>
        <button class="icon ed" data-id="${r.id}">✎</button>
        <button class="icon rm" data-id="${r.id}">×</button>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.ed').forEach(b => b.onclick = () => {
    renderForm(state.reports.find(r => r.id === b.dataset.id));
    window.scrollTo({ top:0, behavior:'smooth' });
  });
  list.querySelectorAll('.rm').forEach(b => b.onclick = async () => {
    if (!confirm(T[lang].confirm)) return;
    const { error } = await db.from('inbody_reports').delete().eq('id', b.dataset.id);
    if (error){ msg.textContent = error.message; return; }
    await loadReports();
    if (state.editing?.id === b.dataset.id) renderForm(null);
  });
}

/* service worker — makes the app installable */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW:', err)));
}

/* boot */
setMode('in');
applyLang();
auth.classList.remove('hidden');
</script>
</body>
</html>
